<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:#fbfaf7;display:grid;grid-template-columns:1fr 1fr;gap:24px;}
  .field{display:flex;flex-direction:column;gap:6px;}

  /* Label — one tracked-caps voice, used only here */
  label{font-family:var(--font-sans);font-size:10px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:#555450;}

  /* Input — clean, upright, consistent */
  input,textarea,select{
    font-family:var(--font-sans);font-size:14px;font-weight:400;
    color:#0e2439;background:transparent;
    border:none;border-bottom:1px solid #e2e4e1;
    padding:10px 0;outline:none;width:100%;
    transition:border-color 180ms;
  }
  input:focus{border-bottom-color:#4a9d97;}

  .help{font-family:var(--font-sans);font-size:12px;color:#8b8a84;}

  /* Pills — match input font exactly */
  .pill{
    display:inline-flex;align-items:center;
    padding:7px 14px;
    border:1px solid #e2e4e1;border-radius:999px;
    font-family:var(--font-sans);font-size:13px;font-weight:500;
    color:#555450;cursor:pointer;
    transition:all 180ms;
  }
  .pill.on{background:#0e2439;color:#ffffff;border-color:#0e2439;}
  .row{display:flex;gap:8px;flex-wrap:wrap;padding-top:4px;}

  /* Checkboxes — same sans as everything else */
  .check{display:flex;align-items:center;gap:10px;font-family:var(--font-sans);font-size:14px;font-weight:400;color:#0e2439;}
  .box{
    width:16px;height:16px;flex-shrink:0;
    border:1.5px solid #e2e4e1;border-radius:4px;
    display:inline-flex;align-items:center;justify-content:center;
  }
  .box.on{background:#0e2439;border-color:#0e2439;color:#ffffff;font-size:10px;}
</style></head>
<body>
  <div class="field">
    <label>Your name</label>
    <input value="Finn Bennett">
    <span class="help">As you'd like it on the contract.</span>
  </div>

  <div class="field">
    <label>Project type</label>
    <div class="row">
      <span class="pill on">Brand</span>
      <span class="pill">Web</span>
      <span class="pill">Both</span>
    </div>
  </div>

  <div class="field">
    <label>Timeline</label>
    <input value="Q2 2026">
  </div>

  <div class="field">
    <label>Scope</label>
    <div style="display:flex;flex-direction:column;gap:8px;padding-top:4px;">
      <span class="check"><span class="box on">✓</span>Identity system</span>
      <span class="check"><span class="box"></span>Website build</span>
      <span class="check"><span class="box"></span>Ongoing retainer</span>
    </div>
  </div>
</body></html>
