<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--paper-100);display:flex;gap:28px;align-items:flex-end;justify-content:center;}
  .unit{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .box{width:84px;height:64px;background:var(--ink-900);}
  .lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-900);}
  .val{font-family:var(--font-mono);font-size:9px;color:var(--fog-700);}
</style></head>
<body>
  <div class="unit"><div class="box" style="border-radius:0"></div><div class="lbl">None</div><div class="val">0px · hero, logo</div></div>
  <div class="unit"><div class="box" style="border-radius:2px"></div><div class="lbl">SM</div><div class="val">2px · tags</div></div>
  <div class="unit"><div class="box" style="border-radius:4px"></div><div class="lbl">MD ★</div><div class="val">4px · default</div></div>
  <div class="unit"><div class="box" style="border-radius:8px"></div><div class="lbl">LG</div><div class="val">8px · modals</div></div>
  <div class="unit"><div class="box" style="border-radius:999px;width:120px"></div><div class="lbl">Pill</div><div class="val">utility pills</div></div>
</body></html>
