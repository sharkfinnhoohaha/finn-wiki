<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--paper-100);}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}
  .sw{display:flex;flex-direction:column;gap:6px;}
  .chip{aspect-ratio:1.4/1;border-radius:4px;border:1px solid rgba(14,36,57,0.08);}
  .lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-900);}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--fog-700);}
</style></head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#fbfaf7"></div><div class="lbl">Mist 50</div><div class="hex">#FBFAF7</div></div>
    <div class="sw"><div class="chip" style="background:#f2f4f2"></div><div class="lbl">Mist 100</div><div class="hex">#F2F4F2</div></div>
    <div class="sw"><div class="chip" style="background:#e6ece9"></div><div class="lbl">Mist 200</div><div class="hex">#E6ECE9</div></div>
    <div class="sw"><div class="chip" style="background:#3f7780"></div><div class="lbl">Pacific 500</div><div class="hex">#3F7780</div></div>
    <div class="sw"><div class="chip" style="background:#22545e"></div><div class="lbl">Pacific 700</div><div class="hex">#22545E</div></div>
    <div class="sw"><div class="chip" style="background:#0f3a42"></div><div class="lbl">Pacific 850</div><div class="hex">#0F3A42</div></div>
    <div class="sw"><div class="chip" style="background:#3f7a5a"></div><div class="lbl">Jade 600 ★</div><div class="hex">#3F7A5A</div></div>
    <div class="sw"><div class="chip" style="background:#255a42"></div><div class="lbl">Jade 800</div><div class="hex">#255A42</div></div>
    <div class="sw"><div class="chip" style="background:#143d2c"></div><div class="lbl">Jade 900</div><div class="hex">#143D2C</div></div>
    <div class="sw"><div class="chip" style="background:#c9a775"></div><div class="lbl">Sand 400</div><div class="hex">#C9A775</div></div>
  </div>
</body></html>
