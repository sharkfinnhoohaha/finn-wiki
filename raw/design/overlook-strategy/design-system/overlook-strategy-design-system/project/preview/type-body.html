<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400&display=swap" rel="stylesheet">
<style>
  body{margin:0;padding:28px;background:#fbfaf7;}
  .stack{display:flex;flex-direction:column;gap:14px;}
  .spec{display:grid;grid-template-columns:120px 1fr;align-items:baseline;gap:20px;padding-bottom:10px;border-bottom:1px solid #e2e4e1;}
  .spec:last-child{border-bottom:none;}
  .tag{font-family:var(--font-mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#555450;}
  .h4{font-family:var(--font-sans);font-weight:500;font-size:16px;line-height:1.2;color:#0e2439;margin:0;letter-spacing:.08em;text-transform:uppercase;}
  .lede{font-family:'Kalam',cursive;font-weight:400;font-size:22px;line-height:1.4;color:#0e2439;margin:0;letter-spacing:.01em;}
  .p{font-family:var(--font-serif);font-weight:400;font-size:16px;line-height:1.65;color:#1f3d5a;margin:0;}
  .cap{font-family:var(--font-sans);font-size:12px;color:#555450;margin:0;letter-spacing:.02em;}
</style></head>
<body>
  <div class="stack">
    <div class="spec"><div class="tag">H4<br>Sans UPPER</div><h4 class="h4">The Studio</h4></div>
    <div class="spec"><div class="tag">Lede<br>Kalam 22</div><p class="lede">We work with a small number of clients a year.</p></div>
    <div class="spec"><div class="tag">Body<br>Serif 16</div><p class="p">Every engagement starts with a half-day on the bluff — phone off, notebook open — and ends with a system your team can actually run.</p></div>
    <div class="spec"><div class="tag">Caption<br>Sans 12</div><p class="cap">Photo: the pier at first light, Ventura.</p></div>
  </div>
</body></html>
