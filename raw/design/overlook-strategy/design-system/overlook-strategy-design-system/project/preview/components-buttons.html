<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--paper-100);display:flex;gap:14px;flex-wrap:wrap;align-items:center;}
  .btn{font-family:var(--font-sans);font-size:12px;letter-spacing:.2em;text-transform:uppercase;padding:14px 22px;border-radius:4px;cursor:pointer;transition:all 240ms cubic-bezier(0.22,1,0.36,1);display:inline-flex;align-items:center;gap:10px;text-decoration:none;}
  .btn-primary{background:var(--ink-900);color:var(--paper-50);border:1px solid var(--ink-900);}
  .btn-primary:hover{background:var(--paper-50);color:var(--ink-900);}
  .btn-secondary{background:transparent;color:var(--ink-900);border:1px solid var(--ink-900);}
  .btn-secondary:hover{background:var(--ink-900);color:var(--paper-50);}
  .btn-ghost{background:transparent;color:var(--ink-900);border:1px solid transparent;}
  .btn-ghost:hover{border-color:var(--paper-300);}
  .btn-link{background:transparent;border:none;color:var(--ink-900);padding:14px 0;border-bottom:1px solid var(--ink-900);border-radius:0;}
  .btn-link:hover{color:var(--pacific-600);border-bottom-color:var(--pacific-600);}
</style></head>
<body>
  <a class="btn btn-primary">Start a project →</a>
  <a class="btn btn-secondary">View the work</a>
  <a class="btn btn-ghost">Read more</a>
  <a class="btn btn-link">Full catalog ↗</a>
</body></html>
