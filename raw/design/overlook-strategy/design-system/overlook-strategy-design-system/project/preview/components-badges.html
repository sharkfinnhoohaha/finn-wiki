<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--paper-100);display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .badge{font-family:var(--font-mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;padding:4px 10px;border:1px solid currentColor;border-radius:2px;display:inline-flex;align-items:center;gap:6px;}
  .dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
  .b-live{color:var(--signal-moss);}
  .b-wip{color:var(--sand-600);}
  .b-closed{color:var(--fog-700);}
  .b-ink{color:var(--ink-900);background:var(--ink-900);color:var(--paper-50);border-color:var(--ink-900);}
  .b-tide{color:var(--tide-500);}
  .b-pill{border-radius:999px;padding:3px 12px;}
</style></head>
<body>
  <span class="badge b-live"><span class="dot"></span>Live</span>
  <span class="badge b-wip"><span class="dot"></span>In Progress</span>
  <span class="badge b-closed"><span class="dot"></span>Closed</span>
  <span class="badge b-tide">★ Featured</span>
  <span class="badge b-ink">01 // Case</span>
  <span class="badge b-closed b-pill">Next.js</span>
  <span class="badge b-closed b-pill">Sanity</span>
  <span class="badge b-closed b-pill">GSAP</span>
</body></html>
