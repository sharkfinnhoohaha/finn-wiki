<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:#fbfaf7;display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  .card{
    background:#ffffff;
    border:1px solid #e2e4e1;
    border-radius:10px;
    padding:24px;
    box-shadow:0 1px 2px rgba(14,36,57,0.04), 0 4px 12px rgba(14,36,57,0.06);
    display:flex;flex-direction:column;gap:10px;
  }
  /* Jade outline variant — featured card */
  .card.jade{
    border:1px solid #2f5d46;
    box-shadow:0 1px 2px rgba(14,36,57,0.04), 0 4px 14px rgba(47,93,70,0.10);
  }
  .eyebrow{font-family:var(--font-mono);font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:#555450;margin:0;}
  .jade .eyebrow{color:#2f5d46;}
  .title{font-family:var(--font-serif);font-weight:400;font-size:22px;line-height:1.15;color:#0e2439;margin:0;}
  .body{font-family:var(--font-sans);font-size:13px;line-height:1.55;color:#1f3d5a;margin:0;}
  .meta{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#555450;padding-top:6px;}
</style></head>
<body>
  <div class="card">
    <p class="eyebrow">01 // Case Study</p>
    <h3 class="title">Johnson Aviation</h3>
    <p class="body">Strategic airport planning firm — brand system, site, and collateral. Built for the long view.</p>
    <div class="meta"><span>2025</span><span>Identity · Web</span></div>
  </div>
  <div class="card jade">
    <p class="eyebrow">02 // Featured</p>
    <h3 class="title">Overlook Audio</h3>
    <p class="body">Recording studio &amp; live sound production. Studio site with a founder-led tone.</p>
    <div class="meta"><span>2024</span><span>Identity · Web</span></div>
  </div>
</body></html>
