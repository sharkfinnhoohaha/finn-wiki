<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fbfaf7;}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}
  .sw{display:flex;flex-direction:column;gap:6px;}
  .chip{aspect-ratio:1.4/1;border-radius:4px;border:1px solid rgba(14,36,57,0.08);}
  .lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#0e2439;}
  .hex{font-family:var(--font-mono);font-size:10px;color:#555450;}
</style></head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#0e2439"></div><div class="lbl">Ink 900</div><div class="hex">#0E2439</div></div>
    <div class="sw"><div class="chip" style="background:#122f39"></div><div class="lbl">Ink 800 ★</div><div class="hex">#122F39</div></div>
    <div class="sw"><div class="chip" style="background:#1f3d5a"></div><div class="lbl">Ink 700</div><div class="hex">#1F3D5A</div></div>
    <div class="sw"><div class="chip" style="background:#ffffff;border:1px solid #e2e4e1"></div><div class="lbl">Paper 50</div><div class="hex">#FFFFFF</div></div>
    <div class="sw"><div class="chip" style="background:#fbfaf7;border:1px solid #e2e4e1"></div><div class="lbl">Paper 100</div><div class="hex">#FBFAF7</div></div>
    <div class="sw"><div class="chip" style="background:#f2f4f2;border:1px solid #e2e4e1"></div><div class="lbl">Paper 200</div><div class="hex">#F2F4F2</div></div>
    <div class="sw"><div class="chip" style="background:#e6ece9"></div><div class="lbl">Paper 250</div><div class="hex">#E6ECE9</div></div>
    <div class="sw"><div class="chip" style="background:#e2e4e1"></div><div class="lbl">Paper 300</div><div class="hex">#E2E4E1</div></div>
  </div>
</body></html>
