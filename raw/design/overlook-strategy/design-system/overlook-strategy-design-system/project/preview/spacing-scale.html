<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--paper-100);}
  .row{display:flex;gap:18px;align-items:flex-end;}
  .unit{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .bar{background:var(--ink-900);width:32px;border-radius:2px;}
  .lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;color:var(--ink-900);}
  .val{font-family:var(--font-mono);font-size:9px;color:var(--fog-700);}
</style></head>
<body>
  <div class="row">
    <div class="unit"><div class="bar" style="height:4px"></div><div class="lbl">1</div><div class="val">4px</div></div>
    <div class="unit"><div class="bar" style="height:8px"></div><div class="lbl">2</div><div class="val">8px</div></div>
    <div class="unit"><div class="bar" style="height:12px"></div><div class="lbl">3</div><div class="val">12px</div></div>
    <div class="unit"><div class="bar" style="height:16px"></div><div class="lbl">4</div><div class="val">16px</div></div>
    <div class="unit"><div class="bar" style="height:24px"></div><div class="lbl">5</div><div class="val">24px</div></div>
    <div class="unit"><div class="bar" style="height:32px"></div><div class="lbl">6</div><div class="val">32px</div></div>
    <div class="unit"><div class="bar" style="height:48px"></div><div class="lbl">7</div><div class="val">48px</div></div>
    <div class="unit"><div class="bar" style="height:64px"></div><div class="lbl">8</div><div class="val">64px</div></div>
    <div class="unit"><div class="bar" style="height:96px"></div><div class="lbl">9</div><div class="val">96px</div></div>
    <div class="unit"><div class="bar" style="height:128px"></div><div class="lbl">10</div><div class="val">128px</div></div>
  </div>
</body></html>
