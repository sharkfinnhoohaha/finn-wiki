<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fbfaf7;}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  .block{display:flex;flex-direction:column;gap:10px;padding:20px;border-radius:4px;border:1px solid #e2e4e1;background:#ffffff;}
  .block.inv{background:#0e2439;border-color:#0e2439;}
  .head{display:flex;justify-content:space-between;align-items:baseline;}

  .lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:#555450;}
  .demo-head{font-family:var(--font-serif);font-weight:300;font-size:28px;line-height:1;margin:0;color:#0e2439;}
  .demo-body{font-family:var(--font-sans);font-size:13px;line-height:1.55;margin:0;color:#1f3d5a;}
  .demo-meta{font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#555450;}

  /* Inverse — all text opaque, cream/paper white, accents are tide-300 */
  .block.inv .lbl{color:#b8c8cc;}
  .block.inv .demo-head{color:#ffffff;}
  .block.inv .demo-body{color:#e6ece9;}
  .block.inv .demo-meta{color:#8fc4c1;}
</style></head>
<body>
  <div class="row">
    <div class="block">
      <div class="head"><span class="lbl">On Paper</span><span class="lbl" style="color:#3f7a5a">★ Jade</span></div>
      <h3 class="demo-head">At the coast, quietly.</h3>
      <p class="demo-body">Brand and digital systems for companies that prefer the long view.</p>
      <div class="demo-meta">VENTURA, CA // 34.27° N</div>
    </div>
    <div class="block inv">
      <div class="head"><span class="lbl">On Ink</span><span class="lbl" style="color:#8fc4c1">★ Tide</span></div>
      <h3 class="demo-head">At the coast, quietly.</h3>
      <p class="demo-body">Brand and digital systems for companies that prefer the long view.</p>
      <div class="demo-meta">VENTURA, CA // 34.27° N</div>
    </div>
  </div>
</body></html>
