<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:#fbfaf7;display:flex;gap:24px;align-items:flex-end;flex-wrap:wrap;}
  .unit{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .box{width:104px;height:76px;background:#ffffff;border:1px solid #e2e4e1;border-radius:10px;}
  .lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#0e2439;}
  .val{font-family:var(--font-mono);font-size:9px;color:#555450;}

  /* Modern, soft shadows — layered, low-opacity, slightly offset down */
  .s-flat{box-shadow:0 1px 2px rgba(14,36,57,0.04), 0 0 0 1px rgba(14,36,57,0.03);}
  .s-soft{box-shadow:0 1px 2px rgba(14,36,57,0.04), 0 4px 12px rgba(14,36,57,0.06);}
  .s-card{box-shadow:0 2px 4px rgba(14,36,57,0.04), 0 12px 28px rgba(14,36,57,0.08);}
  .s-lift{box-shadow:0 4px 8px rgba(14,36,57,0.05), 0 24px 56px rgba(14,36,57,0.12);}
</style></head>
<body>
  <div class="unit"><div class="box s-flat"></div><div class="lbl">Flat</div><div class="val">r:10 · 0/1+0/0</div></div>
  <div class="unit"><div class="box s-soft"></div><div class="lbl">Soft</div><div class="val">r:10 · 4/12</div></div>
  <div class="unit"><div class="box s-card"></div><div class="lbl">Card</div><div class="val">r:10 · 12/28</div></div>
  <div class="unit"><div class="box s-lift"></div><div class="lbl">Lift</div><div class="val">r:10 · 24/56</div></div>
</body></html>
