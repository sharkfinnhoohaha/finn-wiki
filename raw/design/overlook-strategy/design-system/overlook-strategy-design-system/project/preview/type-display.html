<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;}
  body{
    display:grid;grid-template-columns:1fr 1fr;min-height:100vh;
    font-family:var(--font-sans);
  }
  .panel{
    padding:44px 44px;box-sizing:border-box;
    display:flex;flex-direction:column;justify-content:center;
    position:relative;
  }
  .panel.light{background:#ffffff;color:#0e2439;}
  .panel.dark{background:#0e2439;color:#faf6ee;}

  .corner{
    position:absolute;top:18px;left:22px;
    font-family:'JetBrains Mono',ui-monospace,monospace;
    font-size:9px;letter-spacing:.22em;text-transform:uppercase;
    color:#8b8a84;
  }
  .panel.dark .corner{color:rgba(250,246,238,0.5);}
  .corner-r{left:auto;right:22px;}

  .stack{display:flex;flex-direction:column;gap:24px;}

  .spec{
    display:grid;
    grid-template-columns:64px 1fr;
    align-items:baseline;
    gap:20px;
    padding-bottom:18px;
    border-bottom:1px solid rgba(14,36,57,0.10);
  }
  .panel.dark .spec{border-bottom:1px solid rgba(250,246,238,0.14);}
  .spec:last-child{border-bottom:none;padding-bottom:0;}

  .tag{
    font-family:'JetBrains Mono',ui-monospace,monospace;
    font-size:9px;letter-spacing:.22em;text-transform:uppercase;
    color:#8b8a84;
    padding-top:4px;
  }
  .panel.dark .tag{color:rgba(250,246,238,0.55);}

  /* Display: mono all caps — technical, architectural */
  .ex-display{
    font-family:var(--font-display-mono);
    font-weight:400;
    font-size:34px;
    line-height:1.15;
    letter-spacing:.14em;
    text-transform:uppercase;
    margin:0;color:inherit;
  }
  /* H2: Playfair Display — higher-contrast serif, more distinctive against mono. */
  .ex-h2{
    font-family:'Playfair Display','Libre Caslon Text','Georgia',serif;
    font-weight:400;
    font-size:30px;line-height:1.08;
    letter-spacing:-0.015em;
    margin:0;color:inherit;
  }
  /* H3: Playfair Display, smaller and regular — structural */
  .ex-h3{
    font-family:'Playfair Display','Libre Caslon Text','Georgia',serif;
    font-weight:400;font-size:18px;line-height:1.3;
    margin:0;color:inherit;
  }
</style></head>
<body>

  <div class="panel light">
    <div class="corner">TYPE // DISPLAY</div>
    <div class="corner corner-r">LIGHT</div>
    <div class="stack">
      <div class="spec">
        <div class="tag">Display</div>
        <h1 class="ex-display">From&nbsp;Altitude</h1>
      </div>
      <div class="spec">
        <div class="tag">H2</div>
        <h2 class="ex-h2">Brand and digital systems, built at the coast.</h2>
      </div>
      <div class="spec">
        <div class="tag">H3</div>
        <h3 class="ex-h3">The studio, and what it does.</h3>
      </div>
    </div>
  </div>

  <div class="panel dark">
    <div class="corner">TYPE // DISPLAY</div>
    <div class="corner corner-r">INK</div>
    <div class="stack">
      <div class="spec">
        <div class="tag">Display</div>
        <h1 class="ex-display">From&nbsp;Altitude</h1>
      </div>
      <div class="spec">
        <div class="tag">H2</div>
        <h2 class="ex-h2">Brand and digital systems, built at the coast.</h2>
      </div>
      <div class="spec">
        <div class="tag">H3</div>
        <h3 class="ex-h3">The studio, and what it does.</h3>
      </div>
    </div>
  </div>

</body></html>
