<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:#fbfaf7;}
  .stack{display:flex;flex-direction:column;gap:16px;}
  .spec{display:grid;grid-template-columns:120px 1fr;align-items:baseline;gap:20px;padding-bottom:10px;border-bottom:1px solid #e2e4e1;}
  .spec:last-child{border-bottom:none;}
  .tag{font-family:var(--font-mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#555450;}
  .eyebrow{font-family:var(--font-sans);font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:#555450;margin:0;}
  .meta{font-family:var(--font-mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#555450;margin:0;}
  .code{font-family:var(--font-mono);font-size:13px;color:#22545e;background:#f2f4f2;padding:2px 6px;border-radius:2px;}
  .wm{font-family:var(--font-serif);font-size:18px;letter-spacing:.12em;text-transform:uppercase;color:#0e2439;margin:0;font-weight:400;}
</style></head>
<body>
  <div class="stack">
    <div class="spec"><div class="tag">Wordmark<br>Serif UPPER</div><p class="wm">Overlook Strategy</p></div>
    <div class="spec"><div class="tag">Eyebrow<br>Sans 12 · .28em</div><p class="eyebrow">Selected Work // 2024–2026</p></div>
    <div class="spec"><div class="tag">Meta<br>Mono 12 · .18em</div><p class="meta">34.2746° N // 119.2290° W</p></div>
    <div class="spec"><div class="tag">Inline code<br>Mono</div><p style="font-family:var(--font-sans);font-size:14px;color:#1f3d5a;margin:0;">Set <span class="code">--color-accent</span> to <span class="code">--tide-500</span>.</p></div>
  </div>
</body></html>
